policy:
  name: "manus-plasma-widget"
  version: "1.0.0"
  preset: startup

  blocked_licenses:
    - GPL-2.0-only
    - GPL-2.0-or-later
    - GPL-3.0-only
    - GPL-3.0-or-later
    - AGPL-3.0-only
    - AGPL-3.0-or-later
    - SSPL-1.0

  allowed_types:
    - permissive
    - public-domain
    - weak-copyleft

  require_commercial: true
  block_unknown: false
  scan_transitive: true

  sbom:
    enabled: true
    formats: [cyclonedx, spdx]
    output: ./sbom/
