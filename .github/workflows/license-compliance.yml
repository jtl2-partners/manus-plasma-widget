name: License — Compliance Scan

on:
  push:
    branches: [main, develop, staging, master]
  pull_request:
    branches: [main, develop, staging, master]

jobs:
  license-check:
    name: License Compliance Check
    runs-on: self-hosted
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: License Compliance Check
        uses: nicklauslittle/license-compliance-enforcer@v2
        with:
          policy: startup
          ecosystems: auto
          fail-on-violation: true
          generate-sbom: true
          post-pr-comment: true

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sbom-report
          path: sbom/
